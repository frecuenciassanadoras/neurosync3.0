<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando NeuroSync...</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2 style="margin:0; font-size: 18px;">CONECTANDO CON EL SERVIDOR...</h2>
        <p style="opacity:0.5; font-size: 14px;">Abriendo acceso seguro...</p>
    </div>

    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            // Corregido: Apunta a la raíz de Netlify
            var target = "https://el-efecto-neurosync.netlify.app/version5.html";

            // Función de Escape
            function escape() {
                if (/Android/i.test(ua)) {
                    var cleanUrl = target.replace(/^https?:\/\//, '');
                    window.location.href = 'intent://' + cleanUrl + '#Intent;scheme=https;package=com.android.chrome;end';
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.location.href = target.replace(/^https?:\/\//, 'googlechromes://');
                    setTimeout(function() {
                        window.location.href = target;
                    }, 500);
                } else {
                    window.location.href = target;
                }
            }

            setTimeout(escape, 100);
            document.body.onclick = escape;
        })();
    </script>
</body>
</html>
